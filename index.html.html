<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nannette</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Raleway:wght@200;300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0b1535;
      --navy-mid: #112050;
      --blue-glow: #1a3a8f;
      --silver: #c8d4e8;
      --gold: #d4af6a;
      --white: #f5f0ff;
      --muted: rgba(200,212,232,0.45);
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      background: var(--navy);
      font-family: 'Raleway', sans-serif;
      color: var(--white);
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: screen;
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(212,175,106,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: all 0.18s ease;
      transform: translate(-50%, -50%);
    }

    /* VIDEO BACKGROUND */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      filter: saturate(1.4) brightness(0.7);
    }

    /* Layered overlays */
    .overlay-gradient {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(26,58,143,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 20% 100%, rgba(11,21,53,0.9) 0%, transparent 60%),
        linear-gradient(180deg, rgba(11,21,53,0.4) 0%, rgba(11,21,53,0.7) 60%, rgba(11,21,53,0.97) 100%);
    }

    /* Grain */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Floating diamonds deco */
    .deco-diamonds {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .diamond {
      position: absolute;
      width: 6px;
      height: 6px;
      border: 1px solid rgba(212,175,106,0.3);
      transform: rotate(45deg);
      animation: floatDiamond linear infinite;
    }

    @keyframes floatDiamond {
      0% { opacity: 0; transform: rotate(45deg) translateY(0); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: rotate(45deg) translateY(-100vh); }
    }

    /* MAIN CONTENT */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px 80px;
    }

    /* Top hero section */
    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      padding-bottom: 20px;
    }

    /* Thin ornamental top line */
    .ornament-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.2s forwards;
    }

    .orn-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }

    .orn-line.r {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .orn-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .orn-text {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 300;
    }

    /* Name */
    .name-block {
      text-align: center;
      margin-bottom: 8px;
      opacity: 0;
      animation: riseIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .name-main {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 10vw, 58px);
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, var(--silver) 40%, var(--gold) 70%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(212,175,106,0.4));
    }

    .name-sub {
      font-family: 'Playfair Display', serif;
      font-size: clamp(14px, 4vw, 18px);
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 3px;
      margin-top: 6px;
    }

    .tagline {
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 300;
      margin-top: 18px;
      opacity: 0;
      animation: fadeIn 1s ease 0.8s forwards;
    }

    /* Divider */
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0;
      width: 100%;
      max-width: 320px;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    .hero-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(212,175,106,0.4), transparent);
    }

    .hero-divider-icon {
      font-size: 16px;
      color: var(--gold);
      opacity: 0.8;
    }

    /* Floating links — no cards, just pure floating text */
    .links {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid rgba(200,212,232,0.08);
      text-decoration: none;
      color: var(--white);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-16px);
      transition: all 0.3s ease;
    }

    .link-item:first-child { animation: slideIn 0.8s ease 1.1s forwards; }
    .link-item:nth-child(2) { animation: slideIn 0.8s ease 1.25s forwards; }
    .link-item:nth-child(3) { animation: slideIn 0.8s ease 1.4s forwards; }
    .link-item:nth-child(4) { animation: slideIn 0.8s ease 1.55s forwards; }
    .link-item:nth-child(5) { animation: slideIn 0.8s ease 1.7s forwards; }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* Hover shimmer */
    .link-item::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,175,106,0.06), transparent);
      transition: left 0.5s ease;
    }

    .link-item:hover::after { left: 100%; }

    .link-item:hover .link-label { color: var(--gold); }
    .link-item:hover .link-value { letter-spacing: 2px; }
    .link-item:hover .link-arrow { transform: translateX(5px); color: var(--gold); }

    .link-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .link-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 300;
      transition: color 0.3s;
    }

    .link-value {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.5px;
      transition: letter-spacing 0.4s ease;
    }

    .link-arrow {
      font-size: 14px;
      color: var(--muted);
      transition: all 0.3s ease;
      font-weight: 200;
    }

    /* Save contact button — floating, no box */
    .save-wrap {
      width: 100%;
      max-width: 360px;
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    .save-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 20px;
      letter-spacing: 1px;
      transition: all 0.4s ease;
      position: relative;
    }

    .save-btn::before {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s ease;
    }

    .save-btn:hover::before { width: 100%; }

    .save-btn:hover {
      filter: drop-shadow(0 0 16px rgba(212,175,106,0.7));
      letter-spacing: 2px;
    }

    .save-caption {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Footer signature */
    .footer {
      margin-top: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 1s ease 2.3s forwards;
    }

    .footer-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.5;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 5px;
      color: rgba(200,212,232,0.25);
      text-transform: uppercase;
    }

    /* Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .name-block { transform: translateY(30px); }

    /* NFC tap entrance pulse */
    .entrance-pulse {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .pulse-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,106,0.6);
      animation: expandPulse 1s ease forwards;
    }

    .pulse-ring:nth-child(2) { animation-delay: 0.2s; }
    .pulse-ring:nth-child(3) { animation-delay: 0.4s; }

    @keyframes expandPulse {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(8); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Entrance pulse -->
  <div class="entrance-pulse">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
  </div>

  <!-- Video background -->
  <div class="video-bg">
    <!--
      INSTRUCTIONS: Replace the src below with your own looping video.
      Best sources:
        • Pexels.com (free luxury/fashion videos)
        • Mixkit.co (free loops)
        • Your own Sora/CapCut generated clip
      Recommended: dark fashion, abstract silk, bokeh lights, slow city night
    -->
    <video autoplay muted loop playsinline
      src="https://cdn.coverr.co/videos/coverr-woman-walking-in-the-city-at-night-4408/1080p.mp4">
    </video>
  </div>

  <div class="overlay-gradient"></div>
  <div class="grain"></div>

  <!-- Floating diamonds -->
  <div class="deco-diamonds" id="diamonds"></div>

  <!-- MAIN PAGE -->
  <div class="page">
    <div class="hero">

      <div class="ornament-top">
        <div class="orn-line"></div>
        <div class="orn-diamond"></div>
        <span class="orn-text">Est. Her Way</span>
        <div class="orn-diamond"></div>
        <div class="orn-line r"></div>
      </div>

      <div class="name-block">
        <div class="name-main">Nannette</div>
        <div class="name-sub">thetruth hurts</div>
      </div>

      <p class="tagline">The Truth · The Energy · The Standard</p>

      <div class="hero-divider">
        <div class="hero-divider-line"></div>
        <div class="hero-divider-icon">✦</div>
        <div class="hero-divider-line"></div>
      </div>

    </div>

    <!-- Links -->
    <div class="links">

      <a href="#" class="link-item">
        <div class="link-left">
          <span class="link-label">Follow</span>
          <span class="link-value">Instagram</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="#" class="link-item">
        <div class="link-left">
          <span class="link-label">Watch</span>
          <span class="link-value">TikTok</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="#" class="link-item">
        <div class="link-left">
          <span class="link-label">Business</span>
          <span class="link-value">Email Me</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="#" class="link-item">
        <div class="link-left">
          <span class="link-label">Shop</span>
          <span class="link-value">My Store</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="#" class="link-item">
        <div class="link-left">
          <span class="link-label">Connect</span>
          <span class="link-value">LinkedIn</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

    </div>

    <!-- Save Contact -->
    <div class="save-wrap">
      <a href="#" class="save-btn">
        ✦ Save My Contact
      </a>
      <span class="save-caption">Add to your phone</span>
    </div>

    <div class="footer">
      <div class="footer-line">
        <div class="footer-dot"></div>
        <span class="footer-text">Tap · Connect · Remember</span>
        <div class="footer-dot"></div>
      </div>
    </div>

  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx - 4 + 'px';
      cursor.style.top = my - 4 + 'px';
    });

    function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    }
    animRing();

    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => {
        cursor.style.transform = 'scale(2.5)';
        ring.style.width = '48px';
        ring.style.height = '48px';
        ring.style.borderColor = 'rgba(212,175,106,0.8)';
      });
      a.addEventListener('mouseleave', () => {
        cursor.style.transform = 'scale(1)';
        ring.style.width = '32px';
        ring.style.height = '32px';
        ring.style.borderColor = 'rgba(212,175,106,0.5)';
      });
    });

    // Floating diamonds
    const container = document.getElementById('diamonds');
    for (let i = 0; i < 18; i++) {
      const d = document.createElement('div');
      d.className = 'diamond';
      d.style.left = Math.random() * 100 + 'vw';
      d.style.top = Math.random() * 100 + 'vh';
      d.style.animationDuration = (12 + Math.random() * 20) + 's';
      d.style.animationDelay = (Math.random() * 15) + 's';
      d.style.opacity = 0;
      const size = 3 + Math.random() * 6;
      d.style.width = size + 'px';
      d.style.height = size + 'px';
      container.appendChild(d);
    }
  </script>
</body>
</html>
